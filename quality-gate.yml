# quality-gate.yml
# Métricas padrão manipuláveis para o Quality Gate.
# Ajuste os valores conforme a maturidade do seu projeto.

profile: "default"

project:
  name: "my-project"
  root: "."
  baseline_mode: true

# Opcional: sobrescreva com --profile rust, --profile node etc. em CI.

scan:
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "coverage"
    - "target"
    - ".dart_tool"
    - ".angular"
    - ".idea"
    - ".vscode"
    - "__pycache__"
  exclude_files:
    - "*.min.js"
    - "*.bundle.js"
    - "*.generated.*"
    - "*.g.dart"

thresholds:
  # Readability / Maintainability
  max_lines_per_file: 400
  max_function_duplicates_allowed: 0
  max_files_over_line_limit_allowed: 0

  # Reliability
  min_coverage_percent: 80

  # Modularity
  warn_lines_per_file: 250

  # Efficiency / Hygiene
  max_total_files_scanned: 5000

coverage:
  enabled: true
  # Exemplos:
  # Angular/JS/TS: coverage/lcov.info
  # Java/Jacoco: target/site/jacoco/jacoco.xml
  # Python/Cobertura: coverage.xml
  # Rust: coverage/tarpaulin.xml ou target/llvm-cov/lcov.info
  # Flutter/Dart: coverage/lcov.info
  # C/C++: coverage/coverage.info ou lcov.info
  paths:
    - "coverage/lcov.info"
    - "coverage/lcov-report/lcov.info"
    - "target/site/jacoco/jacoco.xml"
    - "coverage.xml"
    - "cobertura.xml"
    - "coverage/cobertura.xml"
    - "coverage/tarpaulin.xml"
    - "target/llvm-cov/lcov.info"
    - "coverage/coverage.info"
  fail_if_missing: false

documentation:
  enabled: true
  include_extensions:
    - ".md"
    - ".markdown"
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "coverage"
    - "target"
    - ".dart_tool"
    - ".angular"
    - ".idea"
    - ".vscode"
    - "__pycache__"
    - "quality-gate-report"
  exclude_files: []
  max_lines_per_doc: 300
  max_section_lines: 120
  max_heading_depth: 4
  require_h1: true

reports:
  output_dir: "quality-gate-report"
  json_file: "quality-gate-report.json"
  html_file: "quality-gate-report.html"
  markdown_file: "quality-gate-report.md"

llm_documentation:
  enabled: false
  provider: "openai-compatible"
  endpoint: "https://api.openai.com/v1/chat/completions"
  api_key_env: "OPENAI_API_KEY"
  model_env: "QUALITY_GATE_LLM_MODEL"
  model: ""
  output_file: "quality-gate-ai-review.md"
  timeout_seconds: 60
  temperature: 0.2
  max_output_tokens: 2000
  max_context_chars: 60000
  max_file_chars: 4000
  max_files: 80
  include_source_context: true
  include_documentation_context: true
  validate_output: true
  fail_if_unavailable: false
  fail_if_invalid: false

rules:
  duplicated_functions:
    enabled: true
    # Nomes muito comuns podem gerar falso positivo em alguns projetos.
    ignore_names:
      - "toString"
      - "equals"
      - "hashCode"
      - "constructor"
      - "ngOnInit"
      - "ngOnDestroy"

  file_lines:
    enabled: true

  coverage:
    enabled: true

  documentation:
    enabled: true
