scan:
  include_extensions:
    - ".py"
    - ".pyw"
  exclude_dirs:
    - ".git"
    - "__pycache__"
    - ".pytest_cache"
    - ".mypy_cache"
    - ".ruff_cache"
    - ".venv"
    - "venv"
    - "build"
    - "dist"
    - "htmlcov"
    - ".idea"
    - ".vscode"
  exclude_files:
    - "*_pb2.py"
    - "*_pb2_grpc.py"

coverage:
  paths:
    - "coverage.xml"
    - "coverage/cobertura.xml"
