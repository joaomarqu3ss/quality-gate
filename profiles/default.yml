scan:
  include_extensions:
    - ".java"
    - ".kt"
    - ".js"
    - ".jsx"
    - ".ts"
    - ".tsx"
    - ".py"
    - ".go"
    - ".cs"
    - ".rs"
    - ".dart"
    - ".c"
    - ".h"
    - ".cc"
    - ".cpp"
    - ".cxx"
    - ".hh"
    - ".hpp"
    - ".hxx"
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "coverage"
    - "target"
    - ".dart_tool"
    - ".angular"
    - ".idea"
    - ".vscode"
    - "__pycache__"
  exclude_files:
    - "*.min.js"
    - "*.bundle.js"
    - "*.generated.*"
    - "*.g.dart"

coverage:
  paths:
    - "coverage/lcov.info"
    - "coverage/lcov-report/lcov.info"
    - "target/site/jacoco/jacoco.xml"
    - "coverage.xml"
    - "cobertura.xml"
    - "coverage/cobertura.xml"
    - "coverage/tarpaulin.xml"
    - "target/llvm-cov/lcov.info"
    - "coverage/coverage.info"

documentation:
  include_extensions:
    - ".md"
    - ".markdown"
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "coverage"
    - "target"
    - ".dart_tool"
    - ".angular"
    - ".idea"
    - ".vscode"
    - "__pycache__"
    - "quality-gate-report"
  exclude_files: []
  max_lines_per_doc: 300
  max_section_lines: 120
  max_heading_depth: 4
  require_h1: true
